<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весенняя игра: Исчисляемые существительные</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Fredoka", system-ui, -apple-system, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* Обновленный весенний фон */
            background: url("https://i.postimg.cc/Twb3M8nk/clean_image_(33).png") center/cover no-repeat;
        }
        
        #hero {
            position: absolute;
            bottom: -15px; 
            width: 300px; /* Увеличили ширину кролика */
            height: 360px; /* Увеличили высоту кролика */
            /* Обновленный персонаж - кролик */
            background: url("https://i.postimg.cc/nhVrsPt7/Gemini_Generated_Image_7d9ks57d9ks57d9k.png") center/contain no-repeat;
            transform-origin: center bottom;
            transition: transform 0.1s linear;
        }
        
        .falling {
            position: absolute;
            top: -140px;
            width: 135px; /* Увеличили цветы и конфеты */
            height: 135px; 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            will-change: transform, top;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5)); /* Добавили тень */
        }

        .word-label {
            position: absolute;
            top: 125px; /* Переместили слова чуть ниже из-за увеличения картинки */
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-shadow: 
                -2px -2px 0 #b33951,
                2px -2px 0 #b33951,
                -2px 2px 0 #b33951,
                2px 2px 0 #b33951,
                -2px 0 0 #b33951,
                2px 0 0 #b33951,
                0 -2px 0 #b33951,
                0 2px 0 #b33951,
                0 3px 5px rgba(0,0,0,0.5); /* Сделали обводку текста толще */
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .bonus-label {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            text-shadow: 
                -2px -2px 0 #ff6b6b,
                2px -2px 0 #ff6b6b,
                -2px 2px 0 #ff6b6b,
                2px 2px 0 #ff6b6b,
                -2px 0 0 #ff6b6b,
                2px 0 0 #ff6b6b,
                0 -2px 0 #ff6b6b,
                0 2px 0 #ff6b6b,
                0 3px 5px rgba(255,107,107,0.8); /* Утолщенная обводка для бонусов */
        }
        
        #score-board {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .ui-box {
            padding: 8px 16px;
            border-radius: 12px;
            background: #ffffff;
            border: 4px solid #ff9a9e; /* Розовая весенняя обводка */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #d6336c;
            font-size: 22px;
            font-weight: 700;
        }

        .ui-box label {
            color: #d6336c;
            margin-right: 6px;
            font-weight: 900;
        }
        
        .floating-score {
            position: absolute;
            color: #ff9a9e;
            font-weight: 700;
            font-size: 32px;
            text-shadow: 0 0 8px rgba(255,255,255,0.9), 2px 2px 0 #d6336c;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }
        
        .burst {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            animation: burstAnim 0.4s ease-out forwards;
        }
        .burst.gold {
            background: radial-gradient(circle, rgba(255,215,0,0.9), rgba(255,215,0,0.1));
            box-shadow: 0 0 25px rgba(255,215,0,0.9);
        }
        .burst.black {
            background: radial-gradient(circle, rgba(255,60,60,0.95), rgba(255,0,0,0.1));
            box-shadow: 0 0 20px rgba(255,0,0,0.9);
        }
        @keyframes burstAnim {
            0%   { opacity: 0.9; transform: scale(0.2); }
            100% { opacity: 0;   transform: scale(1.4); }
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 240, 245, 0.85); /* Светлый весенний оверлей */
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .overlay-content {
            position: relative;
            min-width: 400px;
            max-width: 90%;
            padding: 40px;
            border-radius: 20px;
            background: #ffffff; 
            border: 6px solid #ff9a9e; 
            text-align: center;
            color: #d6336c; 
            box-shadow: 0 10px 30px rgba(214, 51, 108, 0.2);
        }

        .overlay h1 {
            margin-bottom: 20px;
            font-size: 38px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #d6336c; 
        }

        .overlay p {
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.5;
            color: #b33951; 
        }

        .overlay button {
            margin-top: 10px;
            padding: 15px 45px;
            font-size: 28px;
            border-radius: 16px;
            border: 4px solid #ff9a9e;
            cursor: pointer;
            background: #ffffff;
            color: #d6336c;
            font-weight: 700;
            transition: transform 0.1s, background 0.2s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .overlay button:hover {
            transform: scale(1.05);
            background: #fff0f5;
        }
        .overlay button:active {
            transform: scale(0.95); 
        }
        
        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,105,180,1);
            box-shadow: 0 0 12px rgba(255,105,180,1);
            animation: firework 1.2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes firework {
            0% {
                opacity: 1;
                transform: translate(0,0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0.1);
            }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="start-overlay" class="overlay" style="display:flex;">
        <div class="overlay-content">
            <p>Use ← → or mouse to move.<br>
                Catch 15 <b>UNCOUNTABLE</b> nouns only!<br>Avoid countable nouns.<br>Catch sweets for bonus points!</p>
            <button id="start-btn">PLAY</button>
        </div>
    </div>

    <div id="score-board">
        <div class="ui-box">
            <label>Score:</label><span id="score">0</span>
        </div>
        <div class="ui-box">
            <label>Errors:</label><span id="errors">0</span> / 3
        </div>
    </div>

    <div id="hero"></div>
    
    <div id="game-over-overlay" class="overlay">
        <div class="overlay-content">
            <h1>GAME OVER</h1>
            <p>Oops! You caught too many countable nouns!</p>
            <button id="retry-btn">RETRY</button>
        </div>
    </div>
    
    <div id="win-overlay" class="overlay">
        <div class="overlay-content">
            <h1>YOU WIN!</h1>
            <p>You caught all the uncountable treats!</p>
            <button id="play-again-btn">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    // Неисчисляемые слова (теперь они правильные для ловли)
    const CORRECT_WORDS = [
        "water", "milk", "juice", "bread", "cheese", 
        "meat", "rice", "soup", "butter", "sugar", 
        "salt", "tea", "coffee", "chocolate", "flour"
    ];
    
    // Исчисляемые слова (теперь мы избегаем их)
    const WRONG_WORDS = [
        "apple", "banana", "carrot", "tomato", "potato", 
        "egg", "orange", "lemon", "cherry", "burger", 
        "sandwich", "pear", "plum", "strawberry", "biscuit"
    ];

    // Изображения для цветов (носители слов)
    const FLOWER_IMAGES = [
        "https://i.postimg.cc/Nf3254jT/Gemini_Generated_Image_eiwouveiwouveiwo.png",
        "https://i.postimg.cc/DZw8tpxF/Gemini_Generated_Image_88eylb88eylb88ey.png",
        "https://i.postimg.cc/cHkrZ7z1/Gemini_Generated_Image_rwi8u6rwi8u6rwi8.png",
        "https://i.postimg.cc/3xQWKxtd/Gemini_Generated_Image_wcjprswcjprswcjp.png"
    ];

    // Изображения для бонусных конфет
    const BONUS_IMAGES = [
        "https://i.postimg.cc/BbcZbxYQ/Gemini_Generated_Image_565v4g565v4g565v.png",
        "https://i.postimg.cc/28r8JKyb/Gemini_Generated_Image_3ysk0w3ysk0w3ysk.png"
    ];

    const MAX_ERRORS = 3;
    const HERO_SPEED = 4;
    const FALL_SPEED_BASE = 1.6; 
    const FALL_SPEED_RAND = 0.8; 
    const SPAWN_INTERVAL = 300;
    const MIN_HORIZONTAL_GAP = 140; /* Слегка увеличили отступ между предметами */
    const SIDE_MARGIN = 80;
    const HERO_SCALE = 1.3; /* Слегка увеличили масштаб кролика для большей объемности */
    const WORD_FONT_SIZE = 28; 
    const MAX_ON_SCREEN = 3;
    
    const game = document.getElementById("game-container");
    const heroEl = document.getElementById("hero");
    const scoreEl = document.getElementById("score");
    const errorsEl = document.getElementById("errors");

    const gameOverOverlay = document.getElementById("game-over-overlay");
    const winOverlay = document.getElementById("win-overlay");
    const startOverlay = document.getElementById("start-overlay");
    const startBtn = document.getElementById("start-btn");
    const retryBtn = document.getElementById("retry-btn");
    const playAgainBtn = document.getElementById("play-again-btn");
    
    let heroX = 0;
    let heroWidthBase = 300; /* Синхронизировали с новой шириной кролика из CSS */
    let heroWidth = heroWidthBase * HERO_SCALE;
    let heroFlipped = false;

    let score = 0;
    let errors = 0;

    let activeObjects = []; 
    let keys = { left:false, right:false };

    let gameRunning = false;
    let spawnTimer = null;
    let lastTime = performance.now();

    let availableCorrectWords = [];
    let availableWrongWords = [];

    // Паттерны появления объектов
    const PATTERNS = [
        ["correct", "wrong", "bonus", "correct"],
        ["wrong", "correct", "wrong", "correct", "bonus"],
        ["correct", "bonus", "wrong"],
        ["wrong", "bonus", "correct"],
        ["correct", "wrong", "correct", "wrong"],
        ["correct", "correct", "wrong", "bonus"]
    ];
    let currentPattern = [];
    let patternIndex = 0;
    let canSpawnNext = true;
    
    function setupHeroScale() {
        heroEl.style.setProperty('--hero-scale', HERO_SCALE);
    }
    
    function updateHeroTransform() {
        const scaleX = heroFlipped ? -1 : 1;
        heroEl.style.transform = `scale(${HERO_SCALE}) scaleX(${scaleX})`;
    }
    
    function chooseRandomPattern() {
        const idx = Math.floor(Math.random() * PATTERNS.length);
        currentPattern = PATTERNS[idx].slice();
        patternIndex = 0;
    }
    
    function getNextTypeFromPattern() {
        if (currentPattern.length === 0 || patternIndex >= currentPattern.length) {
            chooseRandomPattern();
        }
        const t = currentPattern[patternIndex];
        patternIndex++;
        return t;
    }
    
    function initGameState() {
        const rect = game.getBoundingClientRect();
        heroWidth = heroWidthBase * HERO_SCALE;
        heroX = (rect.width - heroWidth) / 2;
        updateHeroPosition();

        score = 0;
        errors = 0;

        activeObjects.forEach(o => o.el.remove());
        activeObjects = [];

        availableCorrectWords = [...CORRECT_WORDS];
        availableWrongWords = [...WRONG_WORDS];

        scoreEl.textContent = score;
        errorsEl.textContent = errors;

        canSpawnNext = true;
        chooseRandomPattern();

        spawnNextByPattern(); 
        canSpawnNext = false;
    }

    function startGame() {
        initGameState();
        hideOverlay(gameOverOverlay);
        hideOverlay(winOverlay);
        hideOverlay(startOverlay);

        gameRunning = true;
        lastTime = performance.now();

        clearInterval(spawnTimer);
        spawnTimer = setInterval(() => {
            if (!gameRunning) return;
            if (canSpawnNext && activeObjects.length < MAX_ON_SCREEN) {
                spawnNextByPattern();
                canSpawnNext = false;
            }
        }, SPAWN_INTERVAL);

        requestAnimationFrame(gameLoop);
    }
   
    function updateHeroPosition() {
        const rect = game.getBoundingClientRect();
        const minX = 0;
        const maxX = rect.width - heroWidth;

        if (heroX < minX) {
            heroX = minX;
        }
        if (heroX > maxX) {
            heroX = maxX;
        }
        heroEl.style.left = heroX + "px";
        updateHeroTransform();
    }
    
    function spawnNextByPattern() {
        const type = getNextTypeFromPattern();
        
        if (type === "correct" && availableCorrectWords.length === 0) {
            if (availableWrongWords.length > 0) spawnItem("wrong");
            return;
        }
        if (type === "wrong" && availableWrongWords.length === 0) {
            if (availableCorrectWords.length > 0) spawnItem("correct");
            return;
        }

        spawnItem(type);
    }

    function getNonOverlappingX(width) {
        const rect = game.getBoundingClientRect();
        const maxAttempts = 30;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const minX = SIDE_MARGIN;
            const maxX = rect.width - width - SIDE_MARGIN;
            const x = Math.random() * (maxX - minX) + minX;
            let overlaps = false;

            for (const obj of activeObjects) {
                const otherWidth = obj.el.offsetWidth || 110;
                const otherLeft = obj.x;
                const otherRight = obj.x + otherWidth;
                const thisLeft = x;
                const thisRight = x + width;

                const horizontalOverlap =
                    thisRight + MIN_HORIZONTAL_GAP > otherLeft &&
                    thisLeft - MIN_HORIZONTAL_GAP < otherRight;

                if (horizontalOverlap) {
                    overlaps = true;
                    break;
                }
            }

            if (!overlaps) return x;
        }
        const minX = SIDE_MARGIN;
        const maxX = rect.width - width - SIDE_MARGIN;
        return Math.random() * (maxX - minX) + minX;
    }
    
    function spawnItem(type) {
        const el = document.createElement("div");
        el.classList.add("falling");

        let isCorrectType = false;
        let isBonus = false;
        let bonusValue = 0;
        let word = "";
        
        // Установка нужной картинки в зависимости от типа
        if (type === "bonus") {
            const randomImgUrl = BONUS_IMAGES[Math.floor(Math.random() * BONUS_IMAGES.length)];
            el.style.backgroundImage = `url("${randomImgUrl}")`;
            isBonus = true;
            bonusValue = Math.random() < 0.5 ? 5 : 10;
            word = "+" + bonusValue;
        } else {
            const randomImgUrl = FLOWER_IMAGES[Math.floor(Math.random() * FLOWER_IMAGES.length)];
            el.style.backgroundImage = `url("${randomImgUrl}")`;
            
            if (type === "correct") {
                const idx = Math.floor(Math.random() * availableCorrectWords.length);
                word = availableCorrectWords.splice(idx, 1)[0];
                isCorrectType = true;
            } else if (type === "wrong") {
                const idx = Math.floor(Math.random() * availableWrongWords.length);
                word = availableWrongWords.splice(idx, 1)[0];
            }
        }

        const width = 135; /* Синхронизировали ширину предметов */
        const x = getNonOverlappingX(width);
        el.style.left = x + "px";

        const label = document.createElement("div");
        label.classList.add("word-label");
        
        if (isBonus) {
            label.classList.add("bonus-label");
        } else {
            label.style.fontSize = WORD_FONT_SIZE + "px";
        }
        
        label.textContent = word;
        el.appendChild(label);

        game.appendChild(el);

        const obj = {
            el,
            x,
            y: -140,
            speed: FALL_SPEED_BASE + Math.random() * FALL_SPEED_RAND,
            isCorrect: isCorrectType,
            isBonus: isBonus,
            bonusValue: bonusValue,
            word: word
        };
        activeObjects.push(obj);
    }
    
    function gameLoop(time) {
        if (!gameRunning) return;

        const dt = (time - lastTime) / 16.67;
        lastTime = time;

        if (keys.left) {
            heroX -= HERO_SPEED * dt;
            heroFlipped = true;
        }
        if (keys.right) {
            heroX += HERO_SPEED * dt;
            heroFlipped = false;
        }
        updateHeroPosition();

        updateObjects(dt);
        requestAnimationFrame(gameLoop);
    }

    function updateObjects(dt) {
        const rect = game.getBoundingClientRect();
        const heroRect = heroEl.getBoundingClientRect();
        const gameRect = game.getBoundingClientRect();

        /* Адаптировали область столкновений (хитбокс) под увеличенного кролика */
        const heroLeft = heroRect.left - gameRect.left + 70; 
        const heroRight = heroRect.right - gameRect.left - 70;
        const heroTop = heroRect.top - gameRect.top + 80;
        const heroBottom = heroRect.bottom - gameRect.top;

        const triggerY = rect.height / 3.5;
        let anyReachedThird = false;

        for (let i = activeObjects.length - 1; i >= 0; i--) {
            const obj = activeObjects[i];
            obj.y += obj.speed * dt;
            obj.el.style.top = obj.y + "px";
            obj.x = parseFloat(obj.el.style.left) || obj.x;

            if (obj.y >= triggerY) {
                anyReachedThird = true;
            }

            if (obj.y > rect.height + 150) {
                if (obj.isCorrect) {
                    availableCorrectWords.push(obj.word);
                } 
                // Слова-обманки и бонусы больше не возвращаются

                obj.el.remove();
                activeObjects.splice(i, 1);
                
                checkWinCondition();
                continue;
            }

            const objRect = obj.el.getBoundingClientRect();
            const oLeft = objRect.left - gameRect.left + 30;
            const oRight = objRect.right - gameRect.left - 30;
            const oTop = objRect.top - gameRect.top + 30;
            const oBottom = objRect.bottom - gameRect.top - 30;

            const intersect =
                oRight > heroLeft &&
                oLeft < heroRight &&
                oBottom > heroTop &&
                oTop < heroBottom;

            if (intersect) {
                handleCollision(obj, i, (heroLeft + heroRight) / 2, heroTop);
            }
        }

        if (anyReachedThird && activeObjects.length < MAX_ON_SCREEN) {
            canSpawnNext = true;
        }

        if (activeObjects.length === 0) {
            canSpawnNext = true;
            checkWinCondition();
        }
    }
    
    function handleCollision(obj, index, centerX, heroTop) {
        if (obj.isBonus) {
            score += obj.bonusValue;
            scoreEl.textContent = score;
            createBurst(centerX, heroTop, "gold");
            createFloatingScore("+" + obj.bonusValue, centerX, heroTop - 40);
            obj.el.remove();
            activeObjects.splice(index, 1);
            checkWinCondition();
        } else if (obj.isCorrect) {
            score += 10;
            scoreEl.textContent = score;
            createBurst(centerX, heroTop, "gold");
            createFloatingScore("+10", centerX, heroTop - 30);
            obj.el.remove();
            activeObjects.splice(index, 1);
            checkWinCondition();
        } else {
            errors++;
            errorsEl.textContent = errors;
            createBurst(centerX, heroTop, "black");
            
            // Слова-обманки больше не возвращаются в игру
            
            obj.el.remove();
            activeObjects.splice(index, 1);
            
            if (errors >= MAX_ERRORS) {
                endGame(false);
            }
        }
    }
    
    function createFloatingScore(text, x, y) {
        const el = document.createElement("div");
        el.classList.add("floating-score");
        el.textContent = text;
        el.style.left = (x - 20) + "px";
        el.style.top = y + "px";
        game.appendChild(el);
        setTimeout(() => el.remove(), 1100);
    }

    function createBurst(x, y, color) {
        const el = document.createElement("div");
        el.classList.add("burst");
        if (color === "gold") el.classList.add("gold");
        if (color === "black") el.classList.add("black");
        el.style.left = (x - 55) + "px";
        el.style.top = (y - 55) + "px";
        game.appendChild(el);
        setTimeout(() => el.remove(), 450);
    }

    function createFireworks() {
        const rect = game.getBoundingClientRect();
        const count = 50;
        for (let i = 0; i < count; i++) {
            const baseX = Math.random() * rect.width;
            const baseY = Math.random() * rect.height;
            const sparks = 8;
            for (let j = 0; j < sparks; j++) {
                const f = document.createElement("div");
                f.classList.add("firework");
                f.style.left = baseX + "px";
                f.style.top = baseY + "px";
                const angle = (Math.PI * 2 * j) / sparks;
                const dist = 30 + Math.random() * 50;
                f.style.setProperty("--dx", Math.cos(angle) * dist + "px");
                f.style.setProperty("--dy", Math.sin(angle) * dist + "px");
                game.appendChild(f);
                setTimeout(() => f.remove(), 1200);
            }
        }
    }
    
    function checkWinCondition() {
        const noMoreCorrectInPool = availableCorrectWords.length === 0;
        const noMoreCorrectOnScreen = !activeObjects.some(o => o.isCorrect);
        
        if (noMoreCorrectInPool && noMoreCorrectOnScreen) {
            endGame(true);
        }
    }

    function endGame(win) {
        gameRunning = false;
        clearInterval(spawnTimer);

        if (win) {
            showOverlay(winOverlay);
            createFireworks();
        } else {
            showOverlay(gameOverOverlay);
        }
    }

    function showOverlay(overlay) {
        overlay.style.display = "flex";
    }

    function hideOverlay(overlay) {
        overlay.style.display = "none";
    }
    
    window.addEventListener("keydown", (e) => {
        const key = (e.key || "").toLowerCase();
        if (e.code === "ArrowLeft" || key === "a" || key === "ф") {
            keys.left = true;
        } else if (e.code === "ArrowRight" || key === "d" || key === "в") {
            keys.right = true;
        }
    });

    window.addEventListener("keyup", (e) => {
        const key = (e.key || "").toLowerCase();
        if (e.code === "ArrowLeft" || key === "a" || key === "ф") {
            keys.left = false;
        } else if (e.code === "ArrowRight" || key === "d" || key === "в") {
            keys.right = false;
        }
    });

    game.addEventListener("mousemove", (e) => {
        if (!gameRunning) return;
        const rect = game.getBoundingClientRect();
        let targetX = e.clientX - rect.left - heroWidth / 2;
        
        if (targetX < heroX - 2) {
            heroFlipped = true;
        } else if (targetX > heroX + 2) {
            heroFlipped = false;
        }
        
        heroX = targetX;
        updateHeroPosition();
    });

    let touchStartX = 0;
    game.addEventListener("touchstart", (e) => {
        touchStartX = e.touches[0].clientX;
        const screenMiddle = window.innerWidth / 2;
        if (touchStartX < screenMiddle) keys.left = true;
        else keys.right = true;
    }, {passive: true});

    game.addEventListener("touchmove", (e) => {
        if (!gameRunning) return;
        const touchX = e.touches[0].clientX;
        const rect = game.getBoundingClientRect();
        let targetX = touchX - rect.left - heroWidth / 2;
        
        if (targetX < heroX - 2) {
            heroFlipped = true;
        } else if (targetX > heroX + 2) {
            heroFlipped = false;
        }
        
        heroX = targetX;
        updateHeroPosition();
    }, {passive: true});

    game.addEventListener("touchend", (e) => {
        keys.left = false;
        keys.right = false;
    });
    
    startBtn.addEventListener("click", startGame);
    retryBtn.addEventListener("click", startGame);
    playAgainBtn.addEventListener("click", startGame);
   
    window.addEventListener("load", () => {
        setupHeroScale();
        updateHeroTransform();
    });
    window.addEventListener("resize", () => {
        updateHeroPosition();
    });
</script>
</body>
</html>
